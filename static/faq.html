<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FAQ PPGD/UEPG</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel">
        <header class="app-header">
          <div>
            <p class="eyebrow">FAQ documental</p>
            <h1>Perguntas frequentes</h1>
          </div>
          <a class="faq-link" href="/">Chat</a>
        </header>
        <article id="faq-document" class="faq-document"></article>
      </section>
    </main>
    <script>
      const faq = document.querySelector("#faq-document");

      function inline(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/`([^`]+)`/g, "<code>$1</code>");
      }

      function renderMarkdown(markdown) {
        const lines = markdown.split(/\r?\n/);
        let html = "";
        let inList = false;

        for (const raw of lines) {
          const line = raw.trim();
          if (!line) {
            if (inList) {
              html += "</ul>";
              inList = false;
            }
            continue;
          }
          if (line.startsWith("# ")) {
            if (inList) html += "</ul>";
            inList = false;
            html += `<h1>${inline(line.slice(2))}</h1>`;
          } else if (line.startsWith("## ")) {
            if (inList) html += "</ul>";
            inList = false;
            html += `<h2>${inline(line.slice(3))}</h2>`;
          } else if (line.startsWith("### ")) {
            if (inList) html += "</ul>";
            inList = false;
            html += `<h3>${inline(line.slice(4))}</h3>`;
          } else if (line.startsWith("- ")) {
            if (!inList) {
              html += "<ul>";
              inList = true;
            }
            html += `<li>${inline(line.slice(2))}</li>`;
          } else {
            if (inList) {
              html += "</ul>";
              inList = false;
            }
            html += `<p>${inline(line)}</p>`;
          }
        }

        if (inList) html += "</ul>";
        faq.innerHTML = html;
      }

      fetch("/static/FAQ.md")
        .then((response) => response.text())
        .then(renderMarkdown)
        .catch(() => {
          faq.textContent = "Não foi possível carregar o FAQ.";
        });
    </script>
  </body>
</html>
